<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>5 Boroughs on the Take</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            dark: '#0d0c0b',
            card: '#1a1512',
            gold: '#d4a843',
            cream: '#f0ead6',
          },
          fontFamily: {
            inter: ['Inter', 'sans-serif'],
          },
        },
      },
    };
  </script>
  <style>
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="bg-dark text-white min-h-screen flex flex-col">

  <!-- Header -->
  <header class="py-8">
    <div class="max-w-3xl mx-auto px-4 text-center">
      <img src="/assets/theme/title.png" alt="5 Boroughs on the Take"
           class="mx-auto w-auto max-h-72 rounded-lg shadow-2xl ring-1 ring-gold/30" />
      <p class="text-gray-500 text-sm mt-4 tracking-widest uppercase">Every borough has a price.</p>
    </div>
  </header>

  <!-- Main Content -->
  <main class="flex-1 flex items-start justify-center px-4 py-10">

    <!-- Auth Panel -->
    <div id="auth-panel" class="w-full max-w-md hidden">
      <div class="bg-card rounded-lg border border-gray-700/40 overflow-hidden">
        <!-- Tabs -->
        <div class="flex border-b border-gray-700/40">
          <button id="tab-login" onclick="switchTab('login')"
            class="flex-1 py-3 text-sm font-semibold tracking-wide uppercase text-gold border-b-2 border-gold">
            Login
          </button>
          <button id="tab-register" onclick="switchTab('register')"
            class="flex-1 py-3 text-sm font-semibold tracking-wide uppercase text-gray-500 border-b-2 border-transparent hover:text-gray-300">
            Register
          </button>
        </div>

        <!-- Login Form -->
        <form id="form-login" class="p-6 space-y-4" onsubmit="handleLogin(event)">
          <div>
            <label class="block text-xs text-gray-400 mb-1 uppercase tracking-wide">Email</label>
            <input type="email" name="email" required
              class="w-full bg-dark border border-gray-700 rounded px-3 py-2 text-sm text-white placeholder-gray-600 focus:outline-none focus:border-gold" />
          </div>
          <div>
            <label class="block text-xs text-gray-400 mb-1 uppercase tracking-wide">Password</label>
            <input type="password" name="password" required
              class="w-full bg-dark border border-gray-700 rounded px-3 py-2 text-sm text-white placeholder-gray-600 focus:outline-none focus:border-gold" />
          </div>
          <div id="login-error" class="text-red-400 text-xs hidden"></div>
          <button type="submit"
            class="w-full bg-gold text-dark font-bold py-2 rounded hover:brightness-110 transition text-sm uppercase tracking-wide">
            Login
          </button>
        </form>

        <!-- Register Form -->
        <form id="form-register" class="p-6 space-y-4 hidden" onsubmit="handleRegister(event)">
          <div>
            <label class="block text-xs text-gray-400 mb-1 uppercase tracking-wide">Name</label>
            <input type="text" name="name" required
              class="w-full bg-dark border border-gray-700 rounded px-3 py-2 text-sm text-white placeholder-gray-600 focus:outline-none focus:border-gold" />
          </div>
          <div>
            <label class="block text-xs text-gray-400 mb-1 uppercase tracking-wide">Email</label>
            <input type="email" name="email" required
              class="w-full bg-dark border border-gray-700 rounded px-3 py-2 text-sm text-white placeholder-gray-600 focus:outline-none focus:border-gold" />
          </div>
          <div>
            <label class="block text-xs text-gray-400 mb-1 uppercase tracking-wide">Password</label>
            <input type="password" name="password" required minlength="6"
              class="w-full bg-dark border border-gray-700 rounded px-3 py-2 text-sm text-white placeholder-gray-600 focus:outline-none focus:border-gold" />
          </div>
          <div id="register-error" class="text-red-400 text-xs hidden"></div>
          <button type="submit"
            class="w-full bg-gold text-dark font-bold py-2 rounded hover:brightness-110 transition text-sm uppercase tracking-wide">
            Register
          </button>
        </form>
      </div>
    </div>

    <!-- Lobby Panel -->
    <div id="lobby-panel" class="w-full max-w-2xl hidden">
      <!-- Welcome bar -->
      <div class="flex items-center justify-between mb-6">
        <p class="text-lg font-semibold">Welcome, <span id="player-name" class="text-gold"></span></p>
        <button onclick="handleLogout()"
          class="text-xs text-gray-400 border border-gray-600 rounded px-3 py-1 hover:text-white hover:border-gray-400 transition uppercase tracking-wide">
          Logout
        </button>
      </div>

      <!-- Create Game -->
      <button onclick="handleCreateGame()"
        class="w-full bg-gold text-dark font-bold py-3 rounded hover:brightness-110 transition text-sm uppercase tracking-wide mb-6">
        Create New Game
      </button>

      <!-- Games -->
      <div class="bg-card rounded-lg border border-gray-700/40 p-5 mb-6">
        <h2 class="text-sm font-semibold uppercase tracking-wide text-gray-400 mb-4">Games</h2>
        <div id="games-list">
          <p class="text-gray-600 text-sm">Loading...</p>
        </div>
      </div>

      <!-- Leaderboard -->
      <div class="bg-card rounded-lg border border-gray-700/40 p-5">
        <h2 class="text-sm font-semibold uppercase tracking-wide text-gold mb-4">🏆 Leaderboard</h2>
        <div id="leaderboard">
          <p class="text-gray-600 text-sm">Loading...</p>
        </div>
      </div>
    </div>

  </main>

  <!-- Footer -->
  <footer class="border-t border-gray-700/50 py-4 text-center">
    <p class="text-gray-600 text-xs tracking-wide uppercase">Built for the streets</p>
  </footer>

  <script>
    let currentUser = null;
    let refreshInterval = null;

    // --- Tab switching ---
    function switchTab(tab) {
      const tabLogin = document.getElementById('tab-login');
      const tabRegister = document.getElementById('tab-register');
      const formLogin = document.getElementById('form-login');
      const formRegister = document.getElementById('form-register');

      if (tab === 'login') {
        tabLogin.classList.add('text-gold', 'border-gold');
        tabLogin.classList.remove('text-gray-500', 'border-transparent');
        tabRegister.classList.remove('text-gold', 'border-gold');
        tabRegister.classList.add('text-gray-500', 'border-transparent');
        formLogin.classList.remove('hidden');
        formRegister.classList.add('hidden');
      } else {
        tabRegister.classList.add('text-gold', 'border-gold');
        tabRegister.classList.remove('text-gray-500', 'border-transparent');
        tabLogin.classList.remove('text-gold', 'border-gold');
        tabLogin.classList.add('text-gray-500', 'border-transparent');
        formRegister.classList.remove('hidden');
        formLogin.classList.add('hidden');
      }
    }

    // --- Auth handlers ---
    async function handleLogin(e) {
      e.preventDefault();
      const form = e.target;
      const errEl = document.getElementById('login-error');
      errEl.classList.add('hidden');

      const body = {
        email: form.email.value,
        password: form.password.value,
      };

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'same-origin',
          body: JSON.stringify(body),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Login failed');
        currentUser = data;
        showLobby();
      } catch (err) {
        errEl.textContent = err.message;
        errEl.classList.remove('hidden');
      }
    }

    async function handleRegister(e) {
      e.preventDefault();
      const form = e.target;
      const errEl = document.getElementById('register-error');
      errEl.classList.add('hidden');

      const body = {
        name: form.name.value,
        email: form.email.value,
        password: form.password.value,
      };

      try {
        const res = await fetch('/api/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'same-origin',
          body: JSON.stringify(body),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Registration failed');
        currentUser = data;
        showLobby();
      } catch (err) {
        errEl.textContent = err.message;
        errEl.classList.remove('hidden');
      }
    }

    async function handleLogout() {
      try {
        await fetch('/api/logout', { method: 'POST', credentials: 'same-origin' });
      } catch (_) {}
      currentUser = null;
      if (refreshInterval) clearInterval(refreshInterval);
      refreshInterval = null;
      showAuth();
    }

    // --- Game handlers ---
    async function handleCreateGame() {
      try {
        const res = await fetch('/api/games', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'same-origin',
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Failed to create game');
        window.location.href = '/game/' + data.gameId;
      } catch (err) {
        alert(err.message);
      }
    }

    async function handleJoinGame(gameId) {
      try {
        const res = await fetch('/api/games/' + gameId + '/join', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'same-origin',
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Failed to join game');
        window.location.href = '/game/' + gameId;
      } catch (err) {
        alert(err.message);
      }
    }

    function gameRow(game) {
      const status = game.status === 'ongoing' ? 'In progress' : (game.status === 'finished' ? `Finished — ${game.winner || '?'} won` : 'Waiting');
      const right = game.mine
        ? `<div class="flex gap-2">
             <button onclick="location.href='/game/${game.gameId}'" class="text-xs font-semibold text-dark bg-gold px-3 py-1.5 rounded hover:brightness-110 uppercase tracking-wide">Resume</button>
             <button onclick="handleDeleteGame('${game.gameId}')" class="text-xs text-gray-400 border border-gray-600 rounded px-3 py-1.5 hover:text-red-400 hover:border-red-500">Delete</button>
           </div>`
        : (game.joinable
            ? `<button onclick="handleJoinGame('${game.gameId}')" class="text-xs font-semibold text-dark bg-gold px-4 py-1.5 rounded hover:brightness-110 uppercase tracking-wide">Join</button>`
            : `<span class="text-xs text-gray-600">${status}</span>`);
      return `<div class="flex items-center justify-between py-3 border-b border-gray-700/30 last:border-0">
          <div>
            <p class="text-sm font-medium text-white">Game #${game.gameId} <span class="text-gray-500 text-xs">· ${status}</span></p>
            <p class="text-xs text-gray-500">${game.playerCount || 0} player(s)${game.turn ? ' · round ' + game.turn : ''}</p>
          </div>${right}</div>`;
    }

    async function loadGames() {
      const container = document.getElementById('games-list');
      try {
        const res = await fetch('/api/games', { credentials: 'same-origin' });
        const games = await res.json();
        if (!res.ok) throw new Error('Failed to load games');

        const mine = games.filter(g => g.mine);
        const open = games.filter(g => g.joinable);
        let html = '';
        if (mine.length) html += '<p class="text-xs uppercase tracking-wider text-gray-500 mb-1">Your games</p>' + mine.map(gameRow).join('');
        if (open.length) html += '<p class="text-xs uppercase tracking-wider text-gray-500 mt-3 mb-1">Open to join</p>' + open.map(gameRow).join('');
        container.innerHTML = html || '<p class="text-gray-600 text-sm">No games yet. Create one above.</p>';
      } catch (_) {
        container.innerHTML = '<p class="text-red-400 text-sm">Could not load games.</p>';
      }
    }

    async function handleDeleteGame(gameId) {
      if (!confirm('Delete this game? (It will be recorded to the leaderboard if it had real play.)')) return;
      await fetch('/api/games/' + gameId + '/delete', { method: 'POST', credentials: 'same-origin' });
      loadGames(); loadLeaderboard();
    }

    async function loadLeaderboard() {
      const el = document.getElementById('leaderboard');
      try {
        const res = await fetch('/api/leaderboard', { credentials: 'same-origin' });
        const { players, recent } = await res.json();
        let html = '';
        if (!players.length) {
          html = '<p class="text-gray-600 text-sm">No finished games yet. Win one!</p>';
        } else {
          html = '<table class="w-full text-sm"><thead><tr class="text-gray-500 text-xs uppercase"><th class="text-left pb-1">Player</th><th class="text-right">Wins</th><th class="text-right">Games</th><th class="text-right">Best NW</th></tr></thead><tbody>'
            + players.map((p, i) => `<tr class="border-t border-gray-700/30">
                <td class="py-1.5 ${i === 0 ? 'text-gold font-semibold' : 'text-white'}">${i === 0 ? '👑 ' : ''}${p.name}</td>
                <td class="text-right text-gold">${p.wins}</td>
                <td class="text-right text-gray-400">${p.games}</td>
                <td class="text-right text-green-400">$${(p.bestNetWorth || 0).toLocaleString()}</td>
              </tr>`).join('') + '</tbody></table>';
        }
        if (recent && recent.length) {
          html += '<p class="text-xs uppercase tracking-wider text-gray-500 mt-4 mb-1">Recent results</p>'
            + recent.map(r => `<p class="text-xs text-gray-400 py-0.5">🏁 <span class="text-white">${r.winner || '?'}</span> won (${r.reason}, ${r.turns} rounds)</p>`).join('');
        }
        el.innerHTML = html;
      } catch (_) {
        el.innerHTML = '<p class="text-red-400 text-sm">Could not load leaderboard.</p>';
      }
    }

    // --- View toggling ---
    function showAuth() {
      document.getElementById('auth-panel').classList.remove('hidden');
      document.getElementById('lobby-panel').classList.add('hidden');
    }

    function showLobby() {
      document.getElementById('auth-panel').classList.add('hidden');
      document.getElementById('lobby-panel').classList.remove('hidden');
      document.getElementById('player-name').textContent = currentUser.name || currentUser.email;
      loadGames();
      loadLeaderboard();
      if (refreshInterval) clearInterval(refreshInterval);
      refreshInterval = setInterval(() => { loadGames(); loadLeaderboard(); }, 5000);
    }

    // --- Init: check session ---
    async function init() {
      try {
        const res = await fetch('/api/me', { credentials: 'same-origin' });
        if (res.ok) {
          currentUser = await res.json();
          showLobby();
        } else {
          showAuth();
        }
      } catch (_) {
        showAuth();
      }
    }

    init();
  </script>

</body>
</html>
